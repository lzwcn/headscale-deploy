name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: |
          bash -n bin/hsctl headscale-install.sh lib/*.sh tests/*.sh

      - name: Shellcheck
        run: |
          shellcheck -x --source-path=SCRIPTDIR bin/hsctl headscale-install.sh tests/*.sh

      - name: Local validation
        run: |
          bash tests/validate-local.sh

  docker-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker validation
        run: |
          sudo -E bash tests/validate-docker.sh
